<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Clucky Tracker - Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-storage.js";

    // Your Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyDgCSWeI5U_0ICpt74LZSBYTGOxjCiZ_rY",
  authDomain: "kcpeventattendance-ed928.firebaseapp.com",
  databaseURL: "https://kcpeventattendance-ed928-default-rtdb.firebaseio.com",
  projectId: "kcpeventattendance-ed928",
  storageBucket: "kcpeventattendance-ed928.firebasestorage.app",
  messagingSenderId: "883832899509",
  appId: "1:883832899509:web:1eb87d43b7f08d00347bfc",
  measurementId: "G-5DML247JQW"
};

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);
    const chickensCollection = collection(db, "chickens");

    // Fixed credentials
    const FIXED_USERNAME = "admin";
    const FIXED_PASSWORD = "chicken123";

    // DOM elements
    const loginOverlay = document.getElementById("loginOverlay");
    const loginForm = document.getElementById("loginForm");
    const loginError = document.getElementById("loginError");
    const adminContent = document.getElementById("adminContent");
    const logoutBtn = document.getElementById("logoutBtn");
    const chickenForm = document.getElementById("chickenForm");
    const chickenIdInput = document.getElementById("chickenId");
    const nameInput = document.getElementById("name");
    const breedInput = document.getElementById("breed");
    const birthdateInput = document.getElementById("birthdate");
    const colorInput = document.getElementById("color");
    const weightInput = document.getElementById("weight");
    const heightInput = document.getElementById("height");
    const notesInput = document.getElementById("notes");
    const imageInput = document.getElementById("imageInput");
    const currentImagePreview = document.getElementById("currentImagePreview");
    const formTitle = document.getElementById("formTitle");
    const cancelEditBtn = document.getElementById("cancelEdit");
    const chickenListDiv = document.getElementById("chickenList");
    const loadingDiv = document.getElementById("loading");
    const emptyState = document.getElementById("emptyState");

    let isEditing = false;
    let currentEditDocId = null;
    let currentImageFile = null;
    let existingImageUrl = null;

    function checkAuth() {
      const isLoggedIn = sessionStorage.getItem("adminLoggedIn") === "true";
      if (isLoggedIn) {
        loginOverlay.style.display = "none";
        adminContent.style.display = "block";
        loadChickens();
      } else {
        loginOverlay.style.display = "flex";
        adminContent.style.display = "none";
      }
    }

    loginForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      
      if (username === FIXED_USERNAME && password === FIXED_PASSWORD) {
        sessionStorage.setItem("adminLoggedIn", "true");
        loginError.style.display = "none";
        loginOverlay.style.display = "none";
        adminContent.style.display = "block";
        loadChickens();
      } else {
        loginError.style.display = "block";
      }
    });

    logoutBtn.addEventListener("click", () => {
      sessionStorage.removeItem("adminLoggedIn");
      loginOverlay.style.display = "flex";
      adminContent.style.display = "none";
      resetFormToAdd();
    });

    function showLoading(show) {
      loadingDiv.style.display = show ? "flex" : "none";
    }

    function formatDate(dateString) {
      if (!dateString) return "Unknown";
      const date = new Date(dateString);
      return date.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
    }

    function calculateAge(birthdateString) {
      if (!birthdateString) return "N/A";
      const birthDate = new Date(birthdateString);
      const today = new Date();
      let years = today.getFullYear() - birthDate.getFullYear();
      let months = today.getMonth() - birthDate.getMonth();
      let days = today.getDate() - birthDate.getDate();
      if (days < 0) {
        months--;
        const prevMonthDate = new Date(today.getFullYear(), today.getMonth(), 0);
        days += prevMonthDate.getDate();
      }
      if (months < 0) {
        years--;
        months += 12;
      }
      if (years > 0) return `${years}y ${months}m`;
      if (months > 0) return `${months}m ${days}d`;
      return `${days}d`;
    }

    async function uploadImage(chickenId, file) {
      if (!file) return null;
      try {
        // Create a unique filename
        const timestamp = Date.now();
        const safeName = file.name.replace(/[^a-zA-Z0-9.]/g, '_');
        const imageRef = ref(storage, `chickens/${chickenId}/${timestamp}_${safeName}`);
        const snapshot = await uploadBytes(imageRef, file);
        const downloadUrl = await getDownloadURL(snapshot.ref);
        return downloadUrl;
      } catch (error) {
        console.error("Upload error details:", error);
        throw new Error(`Image upload failed: ${error.message}. Please check Firebase Storage rules.`);
      }
    }

    async function deleteOldImage(imageUrl) {
      if (!imageUrl) return;
      try {
        const oldImageRef = ref(storage, imageUrl);
        await deleteObject(oldImageRef);
      } catch (error) {
        console.warn("Could not delete old image:", error);
      }
    }

    async function loadChickens() {
      showLoading(true);
      try {
        const q = query(chickensCollection, orderBy("name", "asc"));
        const querySnapshot = await getDocs(q);
        const chickens = [];
        querySnapshot.forEach((docSnap) => {
          chickens.push({ id: docSnap.id, ...docSnap.data() });
        });
        renderChickenCards(chickens);
        emptyState.style.display = chickens.length === 0 ? "block" : "none";
      } catch (error) {
        console.error("Error loading chickens: ", error);
        chickenListDiv.innerHTML = `<div class="error-message">⚠️ Failed to load chickens. ${error.message}</div>`;
        emptyState.style.display = "none";
      } finally {
        showLoading(false);
      }
    }

    function renderChickenCards(chickens) {
      if (!chickens.length) {
        chickenListDiv.innerHTML = "";
        return;
      }
      chickenListDiv.innerHTML = chickens.map(chicken => `
        <div class="chicken-card" data-id="${chicken.id}">
          <div class="card-header">
            <div class="card-title-area">
              <h3>🐔 ${escapeHtml(chicken.name || "Unnamed")}</h3>
              <span class="chicken-id">#${escapeHtml(chicken.chickenId || "—")}</span>
            </div>
            <div class="card-actions">
              <button class="edit-btn" data-id="${chicken.id}">✏️ Edit</button>
              <button class="delete-btn" data-id="${chicken.id}">🗑️ Delete</button>
            </div>
          </div>
          ${chicken.imageUrl ? `<div class="card-image"><img src="${escapeHtml(chicken.imageUrl)}" alt="${escapeHtml(chicken.name)}" loading="lazy" onerror="this.style.display='none'"></div>` : ''}
          <div class="card-details">
            <div class="detail-row"><span class="detail-label">🐣 Breed:</span> ${escapeHtml(chicken.breed || "Mixed")}</div>
            <div class="detail-row"><span class="detail-label">📅 Birthdate:</span> ${formatDate(chicken.birthdate)} ${chicken.birthdate ? `(Age: ${calculateAge(chicken.birthdate)})` : ""}</div>
            <div class="detail-row"><span class="detail-label">🎨 Color:</span> ${escapeHtml(chicken.color || "Not specified")}</div>
            <div class="detail-row"><span class="detail-label">⚖️ Weight:</span> ${chicken.weight ? escapeHtml(chicken.weight) + " kg" : "Not recorded"}</div>
            <div class="detail-row"><span class="detail-label">📏 Height:</span> ${chicken.height ? escapeHtml(chicken.height) + " cm" : "Not recorded"}</div>
            ${chicken.notes ? `<div class="detail-row notes-row"><span class="detail-label">📝 Notes:</span> ${escapeHtml(chicken.notes)}</div>` : ""}
          </div>
        </div>
      `).join("");

      document.querySelectorAll(".edit-btn").forEach(btn => {
        btn.addEventListener("click", (e) => {
          const id = btn.getAttribute("data-id");
          const chicken = chickens.find(c => c.id === id);
          if (chicken) populateFormForEdit(chicken);
        });
      });
      document.querySelectorAll(".delete-btn").forEach(btn => {
        btn.addEventListener("click", async (e) => {
          const id = btn.getAttribute("data-id");
          const chicken = chickens.find(c => c.id === id);
          if (confirm(`Remove "${chicken.name}" from the coop?`)) {
            await deleteChicken(id, chicken.imageUrl);
          }
        });
      });
    }

    function escapeHtml(str) {
      if (!str) return "";
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    function populateFormForEdit(chicken) {
      isEditing = true;
      currentEditDocId = chicken.id;
      existingImageUrl = chicken.imageUrl || null;
      formTitle.textContent = "✏️ Edit Chicken Details";
      cancelEditBtn.style.display = "inline-block";
      chickenIdInput.value = chicken.chickenId || "";
      nameInput.value = chicken.name || "";
      breedInput.value = chicken.breed || "";
      birthdateInput.value = chicken.birthdate || "";
      colorInput.value = chicken.color || "";
      weightInput.value = chicken.weight || "";
      heightInput.value = chicken.height || "";
      notesInput.value = chicken.notes || "";
      
      if (existingImageUrl) {
        currentImagePreview.style.display = "flex";
        currentImagePreview.querySelector("img").src = existingImageUrl;
      } else {
        currentImagePreview.style.display = "none";
      }
      currentImageFile = null;
      imageInput.value = "";
      document.querySelector(".form-panel").scrollIntoView({ behavior: "smooth" });
    }

    function resetFormToAdd() {
      isEditing = false;
      currentEditDocId = null;
      existingImageUrl = null;
      currentImageFile = null;
      formTitle.textContent = "🐤 Register New Chicken";
      cancelEditBtn.style.display = "none";
      chickenForm.reset();
      currentImagePreview.style.display = "none";
      imageInput.value = "";
    }

    imageInput.addEventListener("change", (e) => {
      if (e.target.files && e.target.files[0]) {
        currentImageFile = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (event) => {
          currentImagePreview.style.display = "flex";
          currentImagePreview.querySelector("img").src = event.target.result;
        };
        reader.readAsDataURL(currentImageFile);
      }
    });

    window.removeImage = function() {
      currentImageFile = null;
      if (!isEditing) {
        existingImageUrl = null;
      }
      currentImagePreview.style.display = "none";
      imageInput.value = "";
    };

    async function saveChicken(event) {
      event.preventDefault();
      const chickenIdValue = chickenIdInput.value.trim();
      if (!chickenIdValue) {
        alert("Please enter a Chicken ID");
        return;
      }
      const nameValue = nameInput.value.trim();
      if (!nameValue) {
        alert("Please enter a chicken name");
        return;
      }
      
      showLoading(true);
      try {
        let finalImageUrl = existingImageUrl;
        
        if (currentImageFile) {
          const tempId = isEditing ? currentEditDocId : `temp_${Date.now()}`;
          const newImageUrl = await uploadImage(tempId, currentImageFile);
          if (newImageUrl) {
            if (isEditing && existingImageUrl) {
              await deleteOldImage(existingImageUrl);
            }
            finalImageUrl = newImageUrl;
          }
        }

        const chickenData = {
          chickenId: chickenIdValue,
          name: nameValue,
          breed: breedInput.value.trim() || "Unknown breed",
          birthdate: birthdateInput.value || null,
          color: colorInput.value.trim() || "Not specified",
          weight: weightInput.value.trim() || null,
          height: heightInput.value.trim() || null,
          notes: notesInput.value.trim() || null,
          imageUrl: finalImageUrl,
          updatedAt: new Date().toISOString()
        };

        if (isEditing && currentEditDocId) {
          const docRef = doc(db, "chickens", currentEditDocId);
          await updateDoc(docRef, chickenData);
          alert("Chicken updated successfully!");
        } else {
          await addDoc(chickensCollection, { ...chickenData, createdAt: new Date().toISOString() });
          alert("New chicken added to the flock!");
        }
        resetFormToAdd();
        await loadChickens();
      } catch (error) {
        console.error("Error saving chicken: ", error);
        alert(`Error: ${error.message}\n\nMake sure Firebase Storage rules allow write access. Go to Firebase Console → Storage → Rules and set: allow read, write: if true;`);
      } finally {
        showLoading(false);
      }
    }

    async function deleteChicken(id, imageUrl) {
      showLoading(true);
      try {
        if (imageUrl) {
          await deleteOldImage(imageUrl);
        }
        const docRef = doc(db, "chickens", id);
        await deleteDoc(docRef);
        await loadChickens();
        if (currentEditDocId === id) resetFormToAdd();
      } catch (error) {
        console.error("Delete error: ", error);
        alert("Could not delete chicken.");
      } finally {
        showLoading(false);
      }
    }

    cancelEditBtn.addEventListener("click", resetFormToAdd);
    chickenForm.addEventListener("submit", saveChicken);
    checkAuth();
  </script>

  <style>
    /* Same CSS as before - kept for brevity */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: linear-gradient(145deg, #fef9e6 0%, #fff5e0 100%); color: #2e241f; min-height: 100vh; }
    .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .login-card { background: white; border-radius: 2rem; padding: 2.5rem; max-width: 400px; width: 90%; text-align: center; }
    .login-card h2 { color: #d45a1a; margin-bottom: 1.5rem; }
    .login-card input { width: 100%; padding: 12px 16px; margin: 10px 0; border: 2px solid #f0dbb4; border-radius: 40px; }
    .login-card button { width: 100%; background: #e67e22; color: white; border: none; padding: 12px; border-radius: 40px; font-weight: bold; cursor: pointer; }
    .login-error { color: #e74c3c; font-size: 0.85rem; margin-top: 10px; display: none; }
    .admin-content { display: none; }
    .app-container { max-width: 1400px; margin: 0 auto; padding: 2rem 1.5rem; }
    .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
    .logo-area h1 { font-size: 2rem; background: linear-gradient(135deg, #d45a1a, #f39c12); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .logout-btn { background: #f1e2c6; border: none; padding: 10px 24px; border-radius: 40px; cursor: pointer; }
    .tracker-grid { display: flex; flex-wrap: wrap; gap: 2rem; }
    .form-panel { flex: 1.2; min-width: 300px; }
    .list-panel { flex: 2.2; min-width: 320px; }
    .form-card, .list-header { background: rgba(255, 248, 235, 0.95); border-radius: 2rem; padding: 1.5rem; border: 1px solid #ffe3b5; }
    .form-card h2 { font-size: 1.6rem; color: #c2591c; margin-bottom: 1.5rem; }
    .form-group { margin-bottom: 1rem; display: flex; flex-direction: column; }
    .form-row { display: flex; gap: 1rem; flex-wrap: wrap; }
    .form-row .form-group { flex: 1; }
    label { font-weight: 600; margin-bottom: 5px; color: #5a3e2b; }
    input, textarea { padding: 10px 14px; border-radius: 24px; border: 1.5px solid #f0dbb4; }
    .image-preview { display: flex; align-items: center; gap: 12px; margin-top: 8px; }
    .image-preview img { width: 80px; height: 80px; object-fit: cover; border-radius: 16px; }
    .button-group { display: flex; gap: 12px; margin-top: 20px; }
    .btn-primary { background: #e67e22; border: none; padding: 12px 24px; border-radius: 40px; color: white; cursor: pointer; flex: 1; }
    .btn-secondary { background: #f1e2c6; border: none; padding: 12px 24px; border-radius: 40px; cursor: pointer; }
    #cancelEdit { display: none; }
    .chicken-grid { display: flex; flex-direction: column; gap: 1rem; }
    .chicken-card { background: white; border-radius: 1.5rem; padding: 1.2rem; border-left: 8px solid #f5bc70; }
    .card-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
    .card-image img { width: 100%; max-height: 200px; object-fit: cover; border-radius: 1rem; margin: 10px 0; }
    .card-details { display: flex; flex-wrap: wrap; gap: 10px; }
    .detail-row { background: #fefaf3; padding: 4px 12px; border-radius: 40px; font-size: 0.85rem; }
    .detail-label { font-weight: 700; color: #ad6939; }
    .edit-btn, .delete-btn { background: none; border: none; padding: 6px 12px; border-radius: 30px; cursor: pointer; }
    .edit-btn { background: #fef1df; color: #d97325; }
    .delete-btn { background: #ffe6e3; color: #c25a3a; }
    .empty-state { text-align: center; padding: 3rem; background: #fff6ea; border-radius: 2rem; }
    .loading-spinner { display: flex; justify-content: center; padding: 2rem; }
    .spinner { width: 36px; height: 36px; border: 4px solid #f3d9b5; border-top: 4px solid #e67e22; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-message { background: #ffe1db; padding: 1rem; border-radius: 1rem; color: #b13e1a; text-align: center; }
    footer { text-align: center; margin-top: 2rem; color: #c99e71; }
    @media (max-width: 720px) { .app-container { padding: 1rem; } .form-row { flex-direction: column; } }
  </style>
</head>
<body>
  <div id="loginOverlay" class="login-overlay">
    <div class="login-card">
      <h2>🐓 Admin Access</h2>
      <form id="loginForm">
        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Login to Dashboard</button>
        <div id="loginError" class="login-error">❌ Invalid credentials. Use admin / chicken123</div>
      </form>
    </div>
  </div>

  <div id="adminContent" class="admin-content">
    <div class="app-container">
      <div class="admin-header">
        <div class="logo-area"><h1>🐔 Clucky Tracker Admin</h1></div>
        <button id="logoutBtn" class="logout-btn">🚪 Logout</button>
      </div>
      <div class="tracker-grid">
        <div class="form-panel">
          <div class="form-card">
            <h2 id="formTitle">🐤 Register New Chicken</h2>
            <form id="chickenForm">
              <div class="form-row">
                <div class="form-group"><label>🏷️ Chicken ID *</label><input type="text" id="chickenId" required></div>
                <div class="form-group"><label>🐔 Name *</label><input type="text" id="name" required></div>
              </div>
              <div class="form-row">
                <div class="form-group"><label>🧬 Breed</label><input type="text" id="breed"></div>
                <div class="form-group"><label>📆 Birthdate</label><input type="date" id="birthdate"></div>
              </div>
              <div class="form-row">
                <div class="form-group"><label>🎨 Color</label><input type="text" id="color"></div>
                <div class="form-group"><label>⚖️ Weight (kg)</label><input type="number" step="0.1" id="weight"></div>
              </div>
              <div class="form-row">
                <div class="form-group"><label>📏 Height (cm)</label><input type="number" step="0.5" id="height"></div>
              </div>
              <div class="form-group"><label>📋 Notes</label><textarea id="notes" rows="2"></textarea></div>
              <div id="currentImagePreview" class="image-preview" style="display:none;"><img alt="Preview"><button type="button" class="remove-img-btn" onclick="removeImage()">Remove</button></div>
              <div class="button-group"><button type="submit" class="btn-primary">💾 Save</button><button type="button" id="cancelEdit" class="btn-secondary">Cancel</button></div>
            </form>
          </div>
        </div>
        <div class="list-panel">
          <div class="list-header"><h3>🐥 My Flock</h3><button class="refresh-btn" onclick="location.reload()">⟳ Refresh</button></div>
          <div id="chickenList" class="chicken-grid"></div>
          <div id="emptyState" class="empty-state" style="display:none;">🐣 No chickens yet!</div>
          <div id="loading" class="loading-spinner" style="display:none;"><div class="spinner"></div></div>
        </div>
      </div>
      <footer>Login: admin / chicken123 | Fix CORS: Update Firebase Storage rules to allow write access</footer>
    </div>
  </div>
</body>
</html>
